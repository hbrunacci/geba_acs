<div class="card h-100 shadow-sm border-0">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h3 class="h6 text-muted mb-0">{{ stat_title|default:"Indicador" }}</h3>
      {% block stat_icon %}{% endblock stat_icon %}
    </div>
    <p class="display-6 fw-semibold mb-1">{{ stat_value|default:"0" }}</p>
    <p class="text-muted small mb-0">{{ stat_meta|default:"" }}</p>
  </div>
  <div class="card-footer bg-transparent border-0 pt-0">
    {% block stat_footer %}{% endblock stat_footer %}
  </div>
</div>
