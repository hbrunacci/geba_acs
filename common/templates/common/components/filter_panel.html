<div class="card shadow-sm border-0">
  <div class="card-body">
    <form class="row g-3 align-items-end" method="get">
      <div class="col-12 col-lg-4">
        <label class="form-label" for="q">Buscar</label>
        <div class="input-group">
          <input
            id="q"
            name="q"
            class="form-control"
            type="search"
            placeholder="Buscar por nombre, código o descripción"
            value="{{ request.GET.q }}"
          />
          <button class="btn btn-outline-primary" type="submit">Buscar</button>
        </div>
      </div>
      <div class="col-6 col-lg-2">
        <label class="form-label" for="status">Estado</label>
        <select id="status" name="status" class="form-select">
          <option value="">Todos</option>
          {% for value, label in status_choices %}
          <option value="{{ value }}" {% if request.GET.status == value %}selected{% endif %}>
            {{ label }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="col-6 col-lg-2">
        <label class="form-label" for="date_from">Desde</label>
        <input id="date_from" name="date_from" class="form-control" type="date" value="{{ request.GET.date_from }}" />
      </div>
      <div class="col-6 col-lg-2">
        <label class="form-label" for="date_to">Hasta</label>
        <input id="date_to" name="date_to" class="form-control" type="date" value="{{ request.GET.date_to }}" />
      </div>
      <div class="col-6 col-lg-2">
        <div class="form-check mt-4">
          <input id="only_active" name="only_active" type="checkbox" class="form-check-input" value="1" {% if request.GET.only_active %}checked{% endif %} />
          <label class="form-check-label" for="only_active">Solo activos</label>
        </div>
      </div>
      <div class="col-12 d-flex flex-wrap gap-2">
        <button class="btn btn-primary" type="submit">Aplicar filtros</button>
        <a class="btn btn-outline-secondary" href="{{ request.path }}">Limpiar</a>
        {% block filters_extra_actions %}{% endblock filters_extra_actions %}
      </div>
    </form>
  </div>
</div>
