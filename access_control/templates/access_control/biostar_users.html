{% extends "common/base.html" %}
{% block extra_css %}
<style>
  .biostar__panel {
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 1rem;
    padding: 1.25rem;
    background: #fff;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
  }

  .biostar__filters {
    display: grid;
    gap: 0.75rem;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    margin-bottom: 1rem;
  }

  .biostar__filters label {
    font-size: 0.8rem;
    color: #64748b;
    margin-bottom: 0.25rem;
  }

  .biostar__filters input {
    width: 100%;
    border: 1px solid rgba(15, 23, 42, 0.12);
    border-radius: 0.5rem;
    padding: 0.45rem 0.6rem;
    font-size: 0.9rem;
  }

  .biostar__table thead th {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .biostar__device-lookup {
    display: grid;
    gap: 0.75rem;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    margin-bottom: 1rem;
    align-items: end;
  }

  .biostar__device-lookup-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .biostar__result {
    border: 1px solid rgba(15, 23, 42, 0.1);
    border-radius: 0.75rem;
    padding: 0.75rem 1rem;
    background: rgba(15, 23, 42, 0.02);
    margin-bottom: 1rem;
    font-size: 0.9rem;
  }

  .biostar__result-title {
    font-weight: 600;
    margin-bottom: 0.35rem;
  }

  .biostar__result-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .biostar__result pre {
    margin: 0.5rem 0 0;
    background: #0f172a;
    color: #e2e8f0;
    padding: 0.5rem;
    border-radius: 0.5rem;
    font-size: 0.78rem;
  }
</style>
{% endblock extra_css %}
{% block content %}
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>BioStar 2 - Personas</h3>
    <div class="d-flex gap-2">
      <button id="sync-users" class="btn btn-secondary btn-sm">Sincronizar personas</button>
    </div>
  </div>

  <div id="msg" class="alert d-none" role="alert"></div>

  <section class="biostar__panel">
    <div class="biostar__device-lookup">
      <div>
        <label for="device-search-id">ID dispositivo</label>
        <input id="device-search-id" type="search" placeholder="Ej: 12" />
      </div>
      <div>
        <label for="device-search-document">Nro. de documento</label>
        <input id="device-search-document" type="search" placeholder="Ej: 30123456" />
      </div>
      <div class="biostar__device-lookup-actions">
        <button id="device-search-btn" class="btn btn-outline-primary btn-sm" type="button">
          Buscar en dispositivo
        </button>
      </div>
    </div>

    <div id="device-user-result" class="biostar__result d-none"></div>

    <div class="biostar__filters">
      <div>
        <label for="users-search-name">Buscar por nombre</label>
        <input id="users-search-name" type="search" placeholder="Ej: Juan Pérez" />
      </div>
      <div>
        <label for="users-search-id">ID BioStar</label>
        <input id="users-search-id" type="search" placeholder="Ej: 4500" />
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-sm table-striped biostar__table">
        <thead>
          <tr>
            <th>
              <button type="button" class="btn btn-link btn-sm p-0" data-sort-key="name">
                Nombre <span class="text-muted">↕</span>
              </button>
            </th>
            <th>
              <button type="button" class="btn btn-link btn-sm p-0" data-sort-key="user_unique_id">
                ID BioStar <span class="text-muted">↕</span>
              </button>
            </th>
            <th>
              <button type="button" class="btn btn-link btn-sm p-0" data-sort-key="email">
                Email <span class="text-muted">↕</span>
              </button>
            </th>
            <th>
              <button type="button" class="btn btn-link btn-sm p-0" data-sort-key="phone">
                Tel <span class="text-muted">↕</span>
              </button>
            </th>
            <th>
              <button type="button" class="btn btn-link btn-sm p-0" data-sort-key="last_synced_at">
                Sync <span class="text-muted">↕</span>
              </button>
            </th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
    </div>
    <div class="d-flex justify-content-between align-items-center mt-2">
      <small id="users-pagination-meta" class="text-muted"></small>
      <div class="btn-group btn-group-sm" role="group" aria-label="Paginación de personas">
        <button id="users-prev" class="btn btn-outline-secondary" type="button" disabled>◀</button>
        <button id="users-next" class="btn btn-outline-secondary" type="button" disabled>▶</button>
      </div>
    </div>
  </section>
</div>

<script>
(function() {
  let usersPage = [];
  const paginationMeta = document.getElementById("users-pagination-meta");
  const prevButton = document.getElementById("users-prev");
  const nextButton = document.getElementById("users-next");
  const sortButtons = document.querySelectorAll("[data-sort-key]");
  const deviceResult = document.getElementById("device-user-result");
  const deviceSearchBtn = document.getElementById("device-search-btn");
  const deviceSearchId = document.getElementById("device-search-id");
  const deviceSearchDocument = document.getElementById("device-search-document");
  const usersState = {
    url: "/api/biostar/users/",
    next: null,
    previous: null,
    count: null,
    page: 1,
    pageSize: 0,
    sortKey: "name",
    sortDir: "asc",
  };

  function showMsg(text, kind) {
    const el = document.getElementById("msg");
    el.className = "alert alert-" + (kind || "info");
    el.textContent = text;
    el.classList.remove("d-none");
    setTimeout(() => el.classList.add("d-none"), 4000);
  }

  async function fetchJSON(url, options) {
    const resp = await fetch(url, {
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": getCookie("csrftoken"),
      },
      ...options
    });
    const contentType = resp.headers.get("content-type") || "";
    const text = await resp.text();
    if (!resp.ok) throw new Error("HTTP " + resp.status + ": " + text.slice(0, 200));
    if (!contentType.includes("application/json")) {
      throw new Error("Respuesta inesperada (no es JSON). ¿Sesión expirada?");
    }
    try {
      return JSON.parse(text);
    } catch (e) {
      throw new Error("JSON inválido: " + e.message);
    }
  }

  function getCookie(name) {
    const v = document.cookie.split(";").map(s => s.trim()).find(s => s.startsWith(name + "="));
    return v ? decodeURIComponent(v.split("=")[1]) : "";
  }

  function compareValues(a, b) {
    const aNum = Number(a);
    const bNum = Number(b);
    if (!Number.isNaN(aNum) && !Number.isNaN(bNum)) {
      return aNum - bNum;
    }
    return String(a ?? "").localeCompare(String(b ?? ""), "es", { numeric: true, sensitivity: "base" });
  }

  function applySort(items) {
    if (!usersState.sortKey) return items;
    const dir = usersState.sortDir === "asc" ? 1 : -1;
    return [...items].sort((a, b) => {
      const valueA = a?.[usersState.sortKey] ?? a?.user_id;
      const valueB = b?.[usersState.sortKey] ?? b?.user_id;
      return compareValues(valueA, valueB) * dir;
    });
  }

  function renderUsers(data) {
    const body = document.getElementById("users-body");
    const sorted = applySort(data);
    body.innerHTML = sorted.map(u => `
      <tr>
        <td>${u.name || ""}</td>
        <td>${u.user_unique_id || u.user_id}</td>
        <td>${u.email || ""}</td>
        <td>${u.phone || ""}</td>
        <td>${(u.last_synced_at || "").replace("T", " ").slice(0,19)}</td>
      </tr>
    `).join("");
  }

  function clearDeviceResult() {
    deviceResult.innerHTML = "";
    deviceResult.classList.add("d-none");
  }

  function renderDeviceResult(data) {
    deviceResult.innerHTML = "";
    deviceResult.classList.remove("d-none");
    const title = document.createElement("div");
    title.className = "biostar__result-title";
    if (data.match) {
      title.textContent = "Usuario encontrado en el dispositivo ✅";
    } else {
      title.textContent = "No se encontró el usuario en el dispositivo";
    }
    deviceResult.appendChild(title);

    const meta = document.createElement("div");
    meta.className = "biostar__result-row text-muted";
    const total = data.total ?? "—";
    meta.textContent = `Dispositivo ${data.device_id} · Documento ${data.document} · Escaneados ${data.scanned} · Total ${total}`;
    deviceResult.appendChild(meta);

    if (data.match) {
      const fields = [
        { label: "Nombre", key: "name" },
        { label: "ID BioStar", key: "user_id" },
        { label: "ID único", key: "user_unique_id" },
        { label: "Grupo", key: "user_group_id" },
      ];
      const details = document.createElement("div");
      details.className = "biostar__result-row";
      fields.forEach(field => {
        if (data.match[field.key] === undefined || data.match[field.key] === null) return;
        const item = document.createElement("div");
        const label = document.createElement("strong");
        label.textContent = `${field.label}: `;
        const value = document.createElement("span");
        value.textContent = data.match[field.key];
        item.appendChild(label);
        item.appendChild(value);
        details.appendChild(item);
      });
      if (details.childElementCount) {
        deviceResult.appendChild(details);
      }

      const payloadDetails = document.createElement("details");
      const summary = document.createElement("summary");
      summary.textContent = "Ver payload completo";
      const pre = document.createElement("pre");
      pre.textContent = JSON.stringify(data.match, null, 2);
      payloadDetails.appendChild(summary);
      payloadDetails.appendChild(pre);
      deviceResult.appendChild(payloadDetails);
    }
  }

  function filterUsers() {
    const nameTerm = document.getElementById("users-search-name").value.trim().toLowerCase();
    const idTerm = document.getElementById("users-search-id").value.trim().toLowerCase();
    const filtered = usersPage.filter(user => {
      const nameMatch = (user.name || "").toLowerCase().includes(nameTerm);
      const idValue = user.user_unique_id || user.user_id || "";
      const idMatch = String(idValue).toLowerCase().includes(idTerm);
      return nameMatch && idMatch;
    });
    renderUsers(filtered);
    if (nameTerm || idTerm) {
      paginationMeta.textContent = `Mostrando ${filtered.length} resultados en esta página`;
    } else if (usersState.count && usersState.pageSize) {
      const start = (usersState.page - 1) * usersState.pageSize + 1;
      const end = Math.min(usersState.page * usersState.pageSize, usersState.count);
      paginationMeta.textContent = `Mostrando ${start}-${end} de ${usersState.count}`;
    } else {
      paginationMeta.textContent = `Mostrando ${filtered.length} resultados`;
    }
  }

  function getPageNumber(url) {
    if (!url) return 1;
    try {
      const parsed = new URL(url, window.location.origin);
      const page = Number(parsed.searchParams.get("page"));
      return Number.isNaN(page) || page <= 0 ? 1 : page;
    } catch (e) {
      return 1;
    }
  }

  function parsePaginated(payload) {
    if (Array.isArray(payload)) {
      return { items: payload, count: payload.length, next: null, previous: null };
    }
    if (payload && Array.isArray(payload.results)) {
      return {
        items: payload.results,
        count: payload.count ?? payload.results.length,
        next: payload.next || null,
        previous: payload.previous || null,
      };
    }
    return { items: [], count: 0, next: null, previous: null };
  }

  function updatePaginationButtons() {
    prevButton.disabled = !usersState.previous;
    nextButton.disabled = !usersState.next;
  }

  async function loadUsers(url) {
    const data = await fetchJSON(url || usersState.url);
    const parsed = parsePaginated(data);
    usersPage = parsed.items;
    usersState.count = parsed.count;
    usersState.next = parsed.next;
    usersState.previous = parsed.previous;
    usersState.pageSize = parsed.items.length;
    usersState.page = getPageNumber(url || usersState.url);
    filterUsers();
    updatePaginationButtons();
  }

  async function searchDeviceUser() {
    const deviceId = deviceSearchId.value.trim();
    const documentNumber = deviceSearchDocument.value.trim();
    if (!deviceId || !documentNumber) {
      showMsg("Ingresá ID de dispositivo y nro. de documento.", "warning");
      return;
    }
    clearDeviceResult();
    try {
      showMsg("Buscando usuario en dispositivo...", "info");
      const url = `/api/biostar/devices/${encodeURIComponent(deviceId)}/users/?document=${encodeURIComponent(documentNumber)}`;
      const data = await fetchJSON(url);
      renderDeviceResult(data);
      showMsg("Búsqueda completada ✅", "success");
    } catch (e) {
      showMsg("Error buscando en dispositivo: " + e.message, "danger");
    }
  }

  document.getElementById("sync-users").addEventListener("click", async () => {
    try {
      showMsg("Sincronizando personas...", "info");
      await fetchJSON("/api/biostar/users/sync/", { method: "POST" });
      await loadUsers();
      showMsg("Personas sincronizadas ✅", "success");
    } catch (e) {
      showMsg("Error sincronizando personas: " + e.message, "danger");
    }
  });

  document.getElementById("users-search-name").addEventListener("input", filterUsers);
  document.getElementById("users-search-id").addEventListener("input", filterUsers);

  prevButton.addEventListener("click", () => {
    if (usersState.previous) {
      loadUsers(usersState.previous).catch(e => showMsg("Error cargando datos: " + e.message, "danger"));
    }
  });

  nextButton.addEventListener("click", () => {
    if (usersState.next) {
      loadUsers(usersState.next).catch(e => showMsg("Error cargando datos: " + e.message, "danger"));
    }
  });

  sortButtons.forEach(button => {
    button.addEventListener("click", () => {
      const key = button.dataset.sortKey;
      if (usersState.sortKey === key) {
        usersState.sortDir = usersState.sortDir === "asc" ? "desc" : "asc";
      } else {
        usersState.sortKey = key;
        usersState.sortDir = "asc";
      }
      filterUsers();
    });
  });

  deviceSearchBtn.addEventListener("click", () => {
    searchDeviceUser();
  });

  deviceSearchDocument.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      searchDeviceUser();
    }
  });

  loadUsers().catch(e => showMsg("Error cargando datos: " + e.message, "danger"));
})();
</script>
{% endblock %}
