{% extends "common/base.html" %}
{% block content %}
<div class="container mt-4">
  <h3>ACS / Test API3000</h3>
  <div id="msg" class="alert d-none" role="alert"></div>

  <div class="card mb-3">
    <div class="card-body">
      <h5 class="card-title">1) Verificar conectividad</h5>
      <div class="row g-2 align-items-end">
        <div class="col-md-6">
          <label for="ip" class="form-label">IP / Host</label>
          <input id="ip" class="form-control" placeholder="192.168.0.10 o acs.local" />
        </div>
        <div class="col-md-3">
          <button id="ping-btn" class="btn btn-outline-primary w-100">Hacer ping</button>
        </div>
      </div>
      <small id="ping-meta" class="text-muted d-block mt-2">Sin verificación reciente.</small>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <h5 class="card-title">2) Ejecutar función</h5>
      <div class="row g-2">
        <div class="col-md-4">
          <label for="function-name" class="form-label">function_name</label>
          <select id="function-name" class="form-select">
            <option value="list_devices">list_devices</option>
            <option value="list_users">list_users</option>
            <option value="list_device_groups">list_device_groups</option>
            <option value="list_device_users">list_device_users</option>
            <option value="discover_device_userdata">discover_device_userdata</option>
            <option value="search_users_v2">search_users_v2</option>
          </select>
        </div>
        <div class="col-md-8">
          <label for="params" class="form-label">params (JSON)</label>
          <textarea id="params" class="form-control" rows="4">{}</textarea>
        </div>
      </div>
      <div class="form-check mt-3 mb-2">
        <input class="form-check-input" type="checkbox" id="confirm-no-ping">
        <label class="form-check-label" for="confirm-no-ping">
          Confirmo continuar sin ping exitoso reciente.
        </label>
      </div>
      <button id="execute-btn" class="btn btn-primary" disabled>Enviar comando</button>
    </div>
  </div>

  <div class="mt-3">
    <h6>Respuesta del wrapper</h6>
    <pre id="raw-response" class="border rounded p-3 bg-light" style="max-height:400px; overflow:auto;">{}</pre>
  </div>
</div>

<script>
(function() {
  const pingBtn = document.getElementById("ping-btn");
  const executeBtn = document.getElementById("execute-btn");
  const pingMeta = document.getElementById("ping-meta");
  const confirmNoPing = document.getElementById("confirm-no-ping");
  const rawResponse = document.getElementById("raw-response");
  const lastPing = { ok: false, at: null };

  function getCookie(name) {
    const v = document.cookie.split(";").map(s => s.trim()).find(s => s.startsWith(name + "="));
    return v ? decodeURIComponent(v.split("=")[1]) : "";
  }

  function showMsg(text, kind) {
    const el = document.getElementById("msg");
    el.className = "alert alert-" + (kind || "info");
    el.textContent = text;
    el.classList.remove("d-none");
    setTimeout(() => el.classList.add("d-none"), 4500);
  }

  async function fetchJSON(url, options) {
    const response = await fetch(url, {
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": getCookie("csrftoken"),
      },
      ...options,
    });
    return await response.json();
  }

  function canExecute() {
    const now = Date.now();
    const hasRecentPing = lastPing.ok && lastPing.at && (now - lastPing.at) <= 60 * 1000;
    return hasRecentPing || confirmNoPing.checked;
  }

  function refreshExecuteState() {
    executeBtn.disabled = !canExecute();
  }

  pingBtn.addEventListener("click", async () => {
    const ip = (document.getElementById("ip").value || "").trim();
    try {
      const payload = await fetchJSON("/api/acs/test/ping/", {
        method: "POST",
        body: JSON.stringify({ ip }),
      });
      rawResponse.textContent = JSON.stringify(payload, null, 2);
      lastPing.ok = !!payload.reachable;
      lastPing.at = Date.now();
      if (payload.reachable) {
        pingMeta.textContent = `Ping OK (${payload.latency_ms ?? "N/D"} ms)`;
        showMsg("Ping exitoso.", "success");
      } else {
        pingMeta.textContent = `Ping falló: ${payload.error || "sin detalle"}`;
        showMsg("Ping sin respuesta.", "warning");
      }
    } catch (err) {
      lastPing.ok = false;
      lastPing.at = Date.now();
      showMsg("No se pudo ejecutar el ping.", "danger");
    }
    refreshExecuteState();
  });

  confirmNoPing.addEventListener("change", refreshExecuteState);

  executeBtn.addEventListener("click", async () => {
    const ip = (document.getElementById("ip").value || "").trim();
    const functionName = document.getElementById("function-name").value;
    let params = {};
    try {
      params = JSON.parse(document.getElementById("params").value || "{}");
    } catch (err) {
      showMsg("El JSON de params es inválido.", "danger");
      return;
    }
    try {
      const payload = await fetchJSON("/api/acs/test/execute/", {
        method: "POST",
        body: JSON.stringify({ ip, function_name: functionName, params }),
      });
      rawResponse.textContent = JSON.stringify(payload, null, 2);
      showMsg(payload.ok ? "Comando ejecutado." : "Comando con error.", payload.ok ? "success" : "warning");
    } catch (err) {
      showMsg("No se pudo enviar el comando.", "danger");
    }
  });

  refreshExecuteState();
})();
</script>
{% endblock %}
